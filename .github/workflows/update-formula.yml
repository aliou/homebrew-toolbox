name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    name: Update ${{ github.event.client_payload.formula }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update formula
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
          BINARY: ${{ github.event.client_payload.binary }}
          REPO: ${{ github.event.client_payload.repo }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          FORMULA_FILE="Formula/${FORMULA}.rb"
          if [ ! -f "$FORMULA_FILE" ]; then
            echo "Formula file not found: $FORMULA_FILE"
            exit 1
          fi

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA_FILE"

          # Update URL and SHA256
          sed -i "s|url \"https://github.com/${REPO}/releases/download/v[^/]*/|url \"https://github.com/${REPO}/releases/download/v${VERSION}/|" "$FORMULA_FILE"
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$FORMULA_FILE"

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "formula: update ${{ github.event.client_payload.formula }} to ${{ github.event.client_payload.version }}"
          title: "formula: update ${{ github.event.client_payload.formula }} to ${{ github.event.client_payload.version }}"
          body: |
            Auto-generated by release of [${{ github.event.client_payload.repo }}](https://github.com/${{ github.event.client_payload.repo }}) v${{ github.event.client_payload.version }}.
          branch: update/${{ github.event.client_payload.formula }}-${{ github.event.client_payload.version }}
          delete-branch: true
