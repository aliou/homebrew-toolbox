name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    name: Update ${{ github.event.client_payload.formula }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update formula and push
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
          BINARY: ${{ github.event.client_payload.binary }}
          REPO: ${{ github.event.client_payload.repo }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          FORMULA_FILE="Formula/${FORMULA}.rb"
          if [ ! -f "$FORMULA_FILE" ]; then
            echo "Formula file not found: $FORMULA_FILE"
            exit 1
          fi

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA_FILE"

          # Update URL and SHA256
          sed -i "s|url \"https://github.com/${REPO}/releases/download/v[^/]*/|url \"https://github.com/${REPO}/releases/download/v${VERSION}/|" "$FORMULA_FILE"
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$FORMULA_FILE"

          # Check for changes
          if git diff --quiet; then
            echo "No changes to formula"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA_FILE"
          git commit -m "formula: update ${FORMULA} to ${VERSION}"
          git push origin main
